<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hald — Graph Viewer</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <span class="logo">&#9678; Hald</span>
    </div>
    <div class="header-right">
      <span id="stats-text" class="stats-text">Loading...</span>
      <button id="btn-screenshot" class="header-btn" title="Save as PNG" aria-label="Save as PNG" disabled>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
          <rect x="1.5" y="3.5" width="13" height="10" rx="1.5"></rect>
          <circle cx="8" cy="8.5" r="2.5"></circle>
          <path d="M5.5 3.5l1-1.5h3l1 1.5"></path>
        </svg>
      </button>
      <button id="btn-theme" class="header-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
          <path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5z"></path>
        </svg>
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
          <circle cx="8" cy="8" r="3"></circle>
          <line x1="8" y1="1.5" x2="8" y2="3"></line>
          <line x1="8" y1="13" x2="8" y2="14.5"></line>
          <line x1="1.5" y1="8" x2="3" y2="8"></line>
          <line x1="13" y1="8" x2="14.5" y2="8"></line>
          <line x1="3.3" y1="3.3" x2="4.4" y2="4.4"></line>
          <line x1="11.6" y1="11.6" x2="12.7" y2="12.7"></line>
          <line x1="3.3" y1="12.7" x2="4.4" y2="11.6"></line>
          <line x1="11.6" y1="4.4" x2="12.7" y2="3.3"></line>
        </svg>
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="Search entities..." autocomplete="off" />
    </div>
    <div id="filter-chips" class="filter-chips">
      <!-- Chips populated by setupTypeChips() based on actual entity types in the graph. -->
    </div>
  </div>

  <!-- Graph -->
  <div id="graph-container">
    <div id="loading">Loading graph...</div>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <button id="sidebar-close">&times;</button>
    <div id="sidebar-content"></div>
  </aside>

  <!-- Dependencies: graphology first (peer dep), then sigma. Vendored locally to work offline. -->
  <script src="/assets/vendor/graphology.umd.min.js"></script>
  <script src="/assets/vendor/sigma.min.js"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
